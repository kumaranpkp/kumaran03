<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - API Listing</title>
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Login</h1>
      <div class="card">
        <form id="loginForm">
          <label>Username<br/><input id="username" name="username" required /></label>
          <br/>
          <label>Password<br/><input id="password" name="password" type="password" required /></label>
          <br/>
          <button type="submit">Sign in</button>
        </form>
        <p><a href="/">Back to API listing</a></p>
      </div>
    </div>
    <script src="/ui/login.js"></script>
  </body>
</html>
